# =========================
# BASIC SITE SETTINGS
# =========================
locale                   : "en-US"
site_theme               : "default"

title                    : "Mochamad Wahyu Hidayat"
title_separator          : "-"
name                     : &name "Mochamad Wahyu Hidayat"
description              : &description "Program/Product/Project Manager | Lecturer"

url                      : "https://mwhidayat.github.io"
baseurl                  : ""
repository               : "mwhidayat/mwhidayat.github.io"


# =========================
# AUTHOR PROFILE
# =========================
author:
  avatar           : "profile.png"
  name             : "Mochamad Wahyu Hidayat"
  bio              : "Data professional with a background in journalism and linguistics. I work across program, product, and project management in the data industry—building analytics systems, leading cross-functional teams, and driving data-informed decisions."
  location         : "Jakarta, Indonesia"
  employer         : "Pacmann / Valiance"
  uri              : "https://mwhidayat.github.io"
  email            : "hidayatmochamadwahyu@gmail.com"

  # Academic / Research
  googlescholar    :
  orcid            :
  researchgate     :

  # Tech / Dev
  github           : "mwhidayat"

  # Social
  linkedin         :
  instagram        : "datavizanalyst"


# =========================
# PUBLICATION / CONTENT
# =========================
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Articles & Writing'
  conferences:
    title: 'Talks & Lectures'


# =========================
# SITE SETTINGS
# =========================
breadcrumbs              : false
words_per_minute         : 180
future                   : true
read_more                : "disabled"
talkmap_link             : false

comments:
  provider               : false


# =========================
# SEO
# =========================
og_description           : "Portfolio of Mochamad Wahyu Hidayat – data analytics, product management, and data-driven systems"


# =========================
# SOCIAL
# =========================
social:
  type                   : Person
  name                   : "Mochamad Wahyu Hidayat"
  links:
    - "https://github.com/mwhidayat"
    - "https://mwhidayat.github.io"


# =========================
# ANALYTICS
# =========================
analytics:
  provider               : false


# =========================
# FILE HANDLING
# =========================
include:
  - .htaccess
  - _pages
  - files

exclude:
  - node_modules
  - vendor
  - tmp
  - log

encoding: "utf-8"
markdown_ext: "md,markdown"


# =========================
# MARKDOWN
# =========================
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  auto_ids: true
  toc_levels: 1..6


# =========================
# COLLECTIONS
# =========================
collections:
  portfolio:
    output: true
    permalink: /portfolio/:path/
  publications:
    output: true
    permalink: /writing/:path/
  talks:
    output: true
    permalink: /talks/:path/
  teaching:
    output: true
    permalink: /teaching/:path/


# =========================
# DEFAULTS
# =========================
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true


# =========================
# PERMALINK
# =========================
permalink: /:categories/:title/
timezone: Asia/Jakarta


# =========================
# PLUGINS
# =========================
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jemoji


# =========================
# ARCHIVES
# =========================
category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/


# =========================
# HTML COMPRESSION
# =========================
compress_html:
  clippings: all
  ignore:
    envs: development
